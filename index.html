<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    
    <!-- Meta tags para responsividade otimizada -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Tickrify" />
    
    <!-- SEO e Performance -->
    <title>Tickrify - Análise Técnica com IA | Trading Inteligente</title>
    <meta name="description" content="Plataforma de análise técnica com IA para traders. Upload de gráficos, análise automática e sinais precisos. Interface responsiva para mobile e desktop." />
    <meta name="keywords" content="trading, análise técnica, IA, gráficos, sinais, mobile trading, AI trading" />
    
    <!-- Open Graph para redes sociais -->
    <meta property="og:title" content="Tickrify - AI Trading Analysis Platform" />
    <meta property="og:description" content="Análise técnica inteligente para traders profissionais" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://tickrify.com" />
    
    <!-- Preload de fontes para performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    
    <!-- PWA Support -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1e40af" />
    
    <!-- iOS Safari específico -->
    <meta name="apple-touch-fullscreen" content="yes" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    
    <!-- Preload crítico para performance -->
    <link rel="modulepreload" href="/src/main.tsx" />
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
